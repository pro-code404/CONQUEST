services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conquest
      POSTGRES_PASSWORD: conquest
      POSTGRES_DB: conquest
    ports:
      - "5432:5432"
    volumes:
      - conquest_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conquest"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  conquest_pg_data:
