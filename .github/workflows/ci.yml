name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  governance:
    name: Architecture governance (Build-0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify frozen corpus present
        run: |
          test -f docs/architecture/ARCHITECTURE-FREEZE.md
          test -f docs/architecture/ccis.md
          test -f docs/sdd/volume-v-engineering-standards-build-governance.md
          test -f docs/governance/ci-law-mapping.md
      - name: Verify Build-0 Authorization Record issued
        run: test -f docs/governance/build-authorization-record-build-0-2026-06-21.md
      - name: Verify Build-1 ops gate artifacts
        run: |
          test -f docs/operations/threat-model-review-v1.0.md
          test -f docs/operations/tenant-isolation-test-plan-v1.0.md
          test -f docs/operations/dr-drill-plan-v1.0.md
          test -f docs/operations/runbooks/README.md
      - name: Verify Build-1 Authorization Record issued
        run: test -f docs/governance/build-authorization-record-build-1-2026-06-26.md
      - name: Verify frozen corpus document count
        run: |
          test -f docs/uxmd/document-x-product-experience-operational-details.md
          test -f docs/architecture/requirements-traceability-matrix.md

  build:
    name: Prototype compile and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
        env:
          MEMORY_REPO: "true"
      - name: Dependency audit (B-24)
        run: pnpm audit --audit-level=high
        continue-on-error: true
